name: Auto Version and Badges

on:
  push:
    branches: [main, master]

jobs:
  version-and-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Auto Version and Badges
        uses: dgaida/auto-version-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-version: true
          create-badge: true
          md-list-fix: true
          run-on-push: true
